<!DOCTYPE html>
<html lang="en-GB">

<title>◊ FallSeed · Agents · Progressive Web App (single HTML file)</title>
<meta name="description" content="FallSeed Agents — a Progressive Web App (PWA) for running an organisation of agents around 6 role presets (Sales / Research / Marketing / Support / Ops / Personal). Per-role system prompts, task libraries, in-tab scheduler, transcript log, audit chain. Build engine and Fork Seed packager included. Single HTML, IDB primary, sovereign.">
<meta name="prime" content="1223">
<meta name="seed-level" content="3">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%20%22FallSeed%20Agents%22%2C%20%22short_name%22%3A%20%22FallSeed-AG%22%2C%20%22start_url%22%3A%20%22.%22%2C%20%22display%22%3A%20%22standalone%22%2C%20%22background_color%22%3A%20%22%230b0a0f%22%2C%20%22theme_color%22%3A%20%22%23b8974a%22%2C%20%22description%22%3A%20%22Sovereign%20agent%20organisation%20%5Cu00b7%206%20role%20presets%20%5Cu00b7%20in-tab%20scheduler%20%5Cu00b7%20streaming%20cascade%22%2C%20%22icons%22%3A%20%5B%7B%22src%22%3A%20%22data%3Aimage/svg%2Bxml%3Butf8%2C%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20fill%3D%27%25230b0a0f%27/%3E%3Ctext%20x%3D%2732%27%20y%3D%2744%27%20text-anchor%3D%27middle%27%20font-size%3D%2740%27%20fill%3D%27%2523b8974a%27%20font-family%3D%27serif%27%20font-weight%3D%27bold%27%3E%5Cu25ca%3C/text%3E%3C/svg%3E%22%2C%20%22sizes%22%3A%20%22any%22%2C%20%22type%22%3A%20%22image/svg%2Bxml%22%7D%5D%7D">
<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--violet:#a855f7;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:8px 11px;outline:none;font-size:13px;width:100%}
textarea{min-height:80px;resize:vertical;font-family:var(--mono);font-size:12px}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
.app{min-height:100dvh;display:grid;grid-template-rows:64px 1fr}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none;padding:0 22px;gap:14px;position:sticky;top:0;z-index:50}
.brand .mark{width:38px;height:38px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:6px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:22px;color:var(--void)}
.brand{display:flex;align-items:center;gap:12px}
.brand .name{font-family:var(--serif);font-weight:700;font-size:18px}
.brand .seal{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.16em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;justify-content:center;gap:4px;flex-wrap:wrap;overflow-x:auto}
nav.tabs button{padding:8px 14px;font-size:13px;color:var(--cream-dim);letter-spacing:.04em;border-radius:4px;white-space:nowrap}
nav.tabs button:hover{color:var(--cream);background:var(--ink)}
nav.tabs button.active{color:var(--brass);background:var(--ink);border-bottom:2px solid var(--brass)}
.tier{padding:6px 12px;border-radius:3px;font-size:11px;color:var(--cream-dim);font-family:var(--mono);border:1px solid var(--line);letter-spacing:.06em;text-transform:uppercase}
main{padding:24px 32px 80px;overflow-y:auto;max-width:1300px;margin:0 auto;width:100%}
.hero{background:linear-gradient(135deg,rgba(184,151,74,.08),rgba(255,140,0,.04));border:1px solid var(--brass);border-radius:6px;padding:28px 30px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:26px;font-weight:700;margin-bottom:8px;color:var(--brass)}
.hero .lede{font-size:14px;color:var(--cream-dim);line-height:1.7;max-width:900px}
.hero .v-badge{display:inline-block;background:var(--brass);color:var(--void);font-family:var(--mono);font-size:10px;letter-spacing:.12em;padding:3px 8px;border-radius:3px;margin-left:10px;vertical-align:middle}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin:24px 0 14px;gap:14px;flex-wrap:wrap}
.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600}
.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:.08em;text-transform:uppercase}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:5px;padding:18px 20px;margin-bottom:14px}
.card h3{font-family:var(--serif);font-size:15px;font-weight:600;margin-bottom:10px}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:18px}
.role-card{background:var(--void-2);border:1px solid var(--line);border-radius:5px;padding:20px;transition:border-color .15s;position:relative}
.role-card:hover{border-color:var(--brass)}
.role-card .head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.role-card .glyph{font-size:32px;color:var(--brass);font-family:var(--serif);line-height:1}
.role-card .name{font-family:var(--serif);font-size:16px;font-weight:600}
.role-card .desc{font-size:12px;color:var(--cream-dim);line-height:1.55;margin-bottom:12px}
.role-card .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.06em}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.btn{padding:8px 16px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.btn.brass:hover{background:var(--amber)}
.btn.sm{padding:5px 11px;font-size:11px}
.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:10px 20px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all .22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.66);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:60px 22px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;padding:24px 26px;max-width:760px;width:100%;max-height:80vh;overflow-y:auto;position:relative}
.modal h3{font-family:var(--serif);font-size:18px;margin-bottom:16px;color:var(--brass)}
.modal .close{position:absolute;top:12px;right:14px;color:var(--cream-muted);font-size:22px;line-height:1}
.modal .close:hover{color:var(--cream)}
.task-card{padding:14px 16px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;background:var(--ink)}
.task-card .title{font-weight:600;margin-bottom:4px}
.task-card .prompt{font-size:12px;color:var(--cream-dim);line-height:1.55;margin-bottom:10px}
.agent-card{padding:16px 18px;border:1px solid var(--line);border-radius:4px;margin-bottom:10px;background:var(--ink);display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
.agent-card .glyph{font-size:24px;color:var(--brass);font-family:var(--serif)}
.agent-card .name{font-weight:600}
.agent-card .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.06em;margin-top:3px}
.run-item{padding:14px 16px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;background:var(--ink)}
.run-item .head{display:flex;justify-content:space-between;margin-bottom:6px;align-items:baseline}
.run-item .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.06em}
.run-item .output-snippet{font-family:var(--mono);font-size:11px;color:var(--cream-dim);background:var(--void);padding:10px 12px;border-radius:3px;margin-top:8px;max-height:140px;overflow:hidden;position:relative}
.run-item .output-snippet::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent, var(--void))}
.inspect-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.inspect-card{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px}
.inspect-card .num{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--brass)}
.inspect-card .lbl{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.preview-area{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:14px;font-family:var(--mono);font-size:11px;line-height:1.5;color:var(--cream-dim);white-space:pre-wrap;max-height:60vh;overflow:auto;min-height:220px}
.preview-area.streaming{color:var(--cream);border-color:var(--green)}
.disclaimer{background:rgba(139,26,26,.12);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:16px;font-size:12px;line-height:1.55;color:var(--cream-dim)}
.disclaimer strong{color:var(--brass)}
.provider-row{display:grid;grid-template-columns:auto 90px 1fr 110px 80px;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;align-items:center;font-size:12px;background:var(--ink)}
.provider-row .toggle{width:36px;height:20px;background:var(--line);border-radius:11px;position:relative;cursor:pointer;flex-shrink:0}
.provider-row .toggle.on{background:var(--green)}
.provider-row .toggle::after{content:'';position:absolute;width:16px;height:16px;background:var(--cream);border-radius:50%;top:2px;left:2px;transition:left .2s}
.provider-row .toggle.on::after{left:18px}
.provider-row .nm{font-family:var(--mono);font-size:11px;color:var(--cream);font-weight:600}
.provider-row .tier-tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:2px 6px;border-radius:3px;text-transform:uppercase;text-align:center}
.provider-row .tier-tag.t1{background:rgba(74,222,128,.15);color:var(--green)}
.provider-row .tier-tag.t2{background:rgba(96,165,250,.15);color:var(--blue)}
.provider-row .tier-tag.tf{background:rgba(168,85,247,.15);color:var(--violet)}
.provider-row .tier-tag.tp{background:rgba(255,140,0,.15);color:var(--amber)}
.provider-row .key-input{padding:5px 8px;font-size:11px}
.provider-row .status-mini{font-family:var(--mono);font-size:10px;color:var(--cream-muted);text-align:right}
.cascade-trace{font-family:var(--mono);font-size:11px;background:var(--ink);border:1px solid var(--line);border-radius:3px;padding:10px 12px;margin-top:8px;max-height:200px;overflow-y:auto}
.cascade-trace .line{padding:3px 0;border-bottom:1px solid var(--line-soft)}
.cascade-trace .line.ok{color:var(--green)} .cascade-trace .line.fail{color:var(--cream-muted)}
.empty-state{padding:32px 24px;text-align:center;color:var(--cream-muted);background:var(--ink);border:1px dashed var(--line);border-radius:5px;font-size:13px}
.status-pill{display:inline-block;padding:3px 9px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.status-pill.queued{background:rgba(168,163,149,.16);color:var(--cream-dim)}
.status-pill.running{background:rgba(96,165,250,.15);color:var(--blue)}
.status-pill.done{background:rgba(74,222,128,.18);color:var(--green)}
.status-pill.failed{background:rgba(239,68,68,.15);color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="mark">◊</div>
      <div>
        <div class="name">FallSeed · Agents</div>
        <div class="seal">level-3 seed · prime 1223 · ◊·κ=1</div>
      </div>
    </div>
    <nav class="tabs"></nav>
    <div class="tier">v2.0</div>
  </header>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <button class="close" onclick="closeModal()">×</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>
<script>
'use strict';

const SEED_DEFAULT = {
  manifest: {
    name: 'agents',
    vertical: 'Agents · actor-tier seed · 6 agent-role presets',
    version: '2.0.0',
    prime: 1223,
    level: 3,
    parent: null,
    primeWindow: [1223],
    bundleRoles: ['role-library', 'agent-instances', 'task-queue', 'run-log', 'schedule'],
    meshChannel: 'fall-agents',
    bloomVector: [5, 5, 5, 4, 4, 3, 3],
    foldSequence: '●〜┃♡△◐◯',
    licence: 'MIT', author: 'Simon Gant', seal: '◊·κ=1'
  },
  agentRoles: {
    sales: {
      name: 'Sales agent', glyph: '◆',
      description: 'Lead qualification, outreach drafting, follow-up planning, demo prep, proposal drafting.',
      systemPrompt: 'You are a Sales agent. Your job is to help qualify leads, draft outbound and reply messages in the user\'s voice, plan follow-up cadence, prepare for demos, and draft proposals. Be specific, concise, and actionable. Always note assumptions you\'re making. If a piece of information is missing, ask for it precisely rather than guessing. Never invent customer data.',
      tasks: [
        { title: 'Qualify a lead from this raw intel', prompt: 'Take the raw context I will provide and produce: (1) BANT (Budget / Authority / Need / Timeline) one-line each, (2) recommended next action, (3) 3 disqualifiers to look out for, (4) draft 2-line reply.' },
        { title: 'Draft a cold outreach', prompt: 'Draft a cold email for the persona / company I provide. Subject line, 80-120 word body, single CTA, no fluff. Match my voice (informal-but-precise).' },
        { title: 'Draft a follow-up sequence', prompt: 'Given that the prospect did X, draft a 3-touch follow-up sequence with timing (e.g. +3 days, +7 days, +14 days). Each touch under 80 words, single ask, varying angle (value / proof / honesty).' },
        { title: 'Prep for a demo', prompt: 'Given the prospect context, output a demo agenda: (1) 5 questions to ask in first 5 min, (2) 3 specific scenarios to show, (3) 3 objections likely + responses, (4) close-the-meeting ask.' },
        { title: 'Draft a proposal', prompt: 'Given the scope and budget, draft a proposal with: executive summary (50 words), deliverables (bullet), timeline (gantt-style text), price + payment terms, assumptions + exclusions, acceptance criteria.' },
        { title: 'Win/loss analysis on a deal', prompt: 'Given the deal history I provide, write a 200-word win/loss analysis: what worked, what failed, what to change next time.' },
      ],
      schedule: 'on-demand · daily morning brief recommended',
      inputContext: 'Pipeline CRM data, recent emails, prospect notes, call transcripts.'
    },
    research: {
      name: 'Research agent', glyph: '◈',
      description: 'Paper synthesis, literature review, competitor analysis, trend monitoring.',
      systemPrompt: 'You are a Research agent. Your job is to surface, summarise, and synthesise information rigorously. Always cite source explicitly. When asked to summarise, output: (1) 5 key claims, (2) 5 caveats, (3) the strongest counter-argument. Distinguish what you actually know from what you\'re inferring. If asked about something post-cutoff, say so.',
      tasks: [
        { title: 'Summarise this paper into 5+5+1', prompt: 'Output: 5 key claims · 5 caveats · 1 strongest counter-argument. Cite section/page for each claim.' },
        { title: 'Build a literature map for [topic]', prompt: 'List the 10 most-cited works in the area, group them into 3-5 schools of thought, identify the live debates, and surface the 3 papers I should read first.' },
        { title: 'Competitor analysis on [company]', prompt: 'Output: positioning (1 sentence), ICP (1 sentence), pricing model, top 3 product features, top 3 weaknesses, the move I should make in response.' },
        { title: 'Trend monitoring digest', prompt: 'Given the topic, list the 5 most recent meaningful developments (last 30-90 days), what they mean, and what I should do about each.' },
        { title: 'Synthesise these notes into a paragraph', prompt: 'Take my notes and produce one tight paragraph (150 words max) that captures the through-line, not a summary of each note.' },
        { title: 'Adversarial critique of my draft', prompt: 'Steel-man the opposing view to what I have written. List 5 specific weaknesses, the strongest reframe, and the one revision that would defuse most attacks.' },
      ],
      schedule: 'on-demand · weekly digest recommended',
      inputContext: 'Papers (PDFs / abstracts), web articles, notes, draft documents.'
    },
    marketing: {
      name: 'Marketing agent', glyph: '◉',
      description: 'Content drafts, campaign briefs, social copy, SEO research, audience expansion.',
      systemPrompt: 'You are a Marketing agent. Your job is to draft content that matches the user\'s voice, frame campaigns clearly, and surface audience insight. Always think in terms of (a) who is this for, (b) what action do they take, (c) why now. Never use cliche openers (\'In today\'s fast-paced world…\'). Prefer short sentences. Specific over abstract.',
      tasks: [
        { title: 'Draft a campaign brief', prompt: 'For the product/launch I describe, output: target audience (3 sentences), single biggest message, 3 supporting proofs, success metric, channel mix recommendation, 2-week activity plan.' },
        { title: 'Draft 5 social posts', prompt: 'In my voice. Each ≤280 chars, single idea, no hashtag spam. Mix: 2 insight, 2 narrative, 1 ask.' },
        { title: 'Draft a long-form post', prompt: 'For the topic I provide, draft 600-900 words. Open with concrete moment, develop a single argument, finish with a non-obvious takeaway. No headers; just paragraphs.' },
        { title: 'Audience segmentation pass', prompt: 'From the data / notes I share, propose 3-5 distinct audience segments. For each: who they are, what they care about, what message lands.' },
        { title: 'SEO topic cluster', prompt: 'For [seed topic], propose: 1 pillar article (50-word brief), 8 cluster article briefs, internal-link plan.' },
        { title: 'Newsletter issue', prompt: 'Draft a newsletter issue from the materials I provide: subject line (8-12 words), opener (60 words), 3 substantive sections, single closing thought, 1 CTA.' },
      ],
      schedule: 'on-demand · weekly content brief recommended',
      inputContext: 'Brand voice notes, product positioning, audience research, past performing content.'
    },
    support: {
      name: 'Support agent', glyph: '◍',
      description: 'Ticket triage, response drafting, knowledge-base lookup, escalation routing.',
      systemPrompt: 'You are a Support agent. Your job is to triage incoming support requests, draft empathetic and accurate replies, surface relevant knowledge-base entries, and escalate when needed. Be warm and specific. Never make up product behaviour. If you don\'t know, say so and offer to escalate. Always confirm the user\'s actual goal, not just their request.',
      tasks: [
        { title: 'Triage this ticket', prompt: 'Classify: urgency (low/med/high/critical), area, suggested owner, estimated complexity, next action. 1 line each.' },
        { title: 'Draft a first-response reply', prompt: 'Empathetic acknowledgement + question to clarify goal + estimated time to resolution. Under 100 words.' },
        { title: 'Draft a resolution reply', prompt: 'Confirm the issue, explain the fix in plain language, give a verification step, ask if anything else.' },
        { title: 'Surface KB articles', prompt: 'Given the issue I describe, propose the 3 most likely existing knowledge-base articles to send. If none exist, propose the 1 KB article that should be written.' },
        { title: 'Escalation note', prompt: 'For this ticket, write a 4-sentence handover to engineering: what happened, what was tried, what the customer wants, what I think is needed.' },
        { title: 'Weekly support pattern review', prompt: 'Given the past 7 days of tickets, surface: top 3 recurring themes, 1 product change that would reduce volume, 1 KB article that needs writing.' },
      ],
      schedule: 'on-demand · hourly during business hours suggested',
      inputContext: 'Ticket text, customer history, product KB, error logs, recent changelog.'
    },
    ops: {
      name: 'Ops agent', glyph: '◐',
      description: 'Daily standup summary, blocker tracking, ticket review, retrospective notes.',
      systemPrompt: 'You are an Ops agent. Your job is to keep the team unblocked and the project visible. Summarise crisply. Surface dependencies and risks early. Be specific about who owns what. Never use management jargon. Prefer \'X is blocked on Y from Z\' over \'there are some dependencies to manage\'.',
      tasks: [
        { title: 'Standup summary', prompt: 'Given the team updates I share, produce: each person\'s yesterday/today/blocker (1 line each), aggregate blockers list with owner + ETA, 3 risks to surface.' },
        { title: 'Weekly project status report', prompt: 'Output: what shipped, what slipped + why, what is at risk, what I need decisions on, what is on track next week.' },
        { title: 'Retrospective notes', prompt: 'From the discussion I paste, structure into: kept-doing, stop-doing, start-doing, 3 concrete commitments with owners.' },
        { title: 'Blocker triage', prompt: 'For each blocker I list, output: severity, who can unblock, what specifically they need from us, when it has to be resolved by.' },
        { title: 'Meeting prep brief', prompt: 'Given the meeting topic + attendees, output: 3 decisions we need, 3 questions to ask, 5-min agenda, who-talks-when.' },
        { title: 'Decision log entry', prompt: 'For the decision I describe, write a structured log entry: context, options considered, decision, rationale, owner, review date.' },
      ],
      schedule: 'on-demand · daily standup-time recommended',
      inputContext: 'Team updates, project tracker, calendar, recent decisions.'
    },
    personal: {
      name: 'Personal agent', glyph: '◌',
      description: 'Calendar review, inbox triage, task prioritisation, daily brief, weekly review.',
      systemPrompt: 'You are a Personal agent. Your job is to help me think clearly about my day, week, and quarter. Be honest about trade-offs. Surface what I\'m avoiding. Never push productivity-porn (\'crush your goals\'). Prefer \'what matters most this week is X — what would you defer to make space?\' over generic advice.',
      tasks: [

async function sha256Hex(input) {

window.__fellowSeeds = window.__fellowSeeds || new Map();

function __seedSelfInfo() {

};
function initMesh() {

    __sigChan.postMessage({ type:'hello', ...__seedSelfInfo() });

      const m = e.data||{}; if (!m.type) return;
      const self = __seedSelfInfo().source;
      if (m.type === 'hello' || m.type === 'pong') {
        if (!m.source || m.source === self) return;
        const ex = window.__fellowSeeds.get(m.source) || {};
        window.__fellowSeeds.set(m.source, { ...ex, ...m, lastSeen: Date.now() });
        if (state.active === 'inspect' && typeof render === 'function') try { render(); } catch(e) {}
      } else if (m.type === 'ping') {
        try { __sigChan.postMessage({ type:'pong', ...__seedSelfInfo() }); } catch(e) {}
      } else if (m.type === 'request' && (m.to === self || m.to === '*') && m.from !== self) {
        const handler = window.__crossSeedHandlers[m.kind]; if (!handler) return;
        try { const result = await handler(m.payload||{}); __sigChan.postMessage({ type:'response', kind:m.kind, from:self, to:m.from, payload:result, reqId:m.reqId }); }
        catch (err) { __sigChan.postMessage({ type:'response', kind:m.kind, from:self, to:m.from, payload:{error:err.message}, reqId:m.reqId }); }
      } else if (m.type === 'response' && m.to === self) {
        const p = window.__crossSeedPending.get(m.reqId);
        if (p) { clearTimeout(p.timer); p.resolve(m.payload); window.__crossSeedPending.delete(m.reqId); }
      }
    };

async function callProvider(p, system, prompt, onChunk) {

async function streamSSE(response, onChunk, kind) {
  const reader = response.body.getReader(); const dec = new TextDecoder();

  while(true) {
    const {value,done} = await reader.read(); if (done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split(/\r?\n/); buf = lines.pop()||'';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim(); if (data === '[DONE]') continue;

        if (d) { acc+=d; onChunk(d); }

function jsLiteral(obj, indent=0) {
  const pad='  '.repeat(indent), padNext='  '.repeat(indent+1);
  if (obj === null) return 'null';
  if (typeof obj === 'number' || typeof obj === 'boolean') return String(obj);
  if (typeof obj === 'string') {
    if (obj.length > 80 || obj.includes('\n')) return '`'+obj.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$\{/g,'\\${')+'`';
    return "'"+obj.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+"'";
  }
  if (Array.isArray(obj)) { if (!obj.length) return '[]'; return '[\n'+obj.map(v=>padNext+jsLiteral(v,indent+1)).join(',\n')+'\n'+pad+']'; }
  if (typeof obj === 'object') { const keys=Object.keys(obj); if (!keys.length) return '{}'; return '{\n'+keys.map(k=>padNext+(/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k)?k:JSON.stringify(k))+': '+jsLiteral(obj[k],indent+1)).join(',\n')+'\n'+pad+'}'; }
  return 'null';
}

let __schedTimer = null;
async function startScheduler() {
  if (__schedTimer) clearInterval(__schedTimer);
  __schedTimer = setInterval(checkSchedules, 60000);
  setTimeout(checkSchedules, 2000); // first check soon after boot
}
async function checkSchedules() {
  const schedules = (await idbGetAll('schedules')).filter(s => s.enabled);
  if (!schedules.length) return;
  const nowMs = Date.now();
  for (const s of schedules) {
    if (s.nextRun && s.nextRun > nowMs) continue;
    // Run it
    try {
      const agent = (await idbGetAll('agents')).find(a => a.id === s.agentId);
      const role = SEED.agentRoles[agent?.role];
      const task = role?.tasks.find(t => t.title === s.taskTitle);
      if (!agent || !task) continue;
      await runAgentTask(agent, task, { auto:true, scheduleId:s.id });
    } catch (e) { console.warn('schedule run failed', e); }
    // Reschedule
    s.lastRun = nowMs; s.nextRun = nowMs + (s.intervalMs || 86400000);
    await idbPut('schedules', s);
  }
}

// ─── Core: run an agent task through the cascade ───
async function runAgentTask(agent, task, opts) {
  opts = opts || {};
  const runId = uid('run');
  const run = {
    id: runId, agentId: agent.id, agentName: agent.name, role: agent.role,
    taskTitle: task.title, taskPrompt: task.prompt,
    status: 'running', startedAt: now(), auto: !!opts.auto, scheduleId: opts.scheduleId||null,
    output: '', provider: null, durationMs: 0
  };
  const c1 = await chainNext({kind:'run.start', id:runId, agent:agent.name, task:task.title});
  run.prevHash = c1.prevHash; run.hash = c1.hash;
  await idbPut('runs', run);
  const role = SEED.agentRoles[agent.role];
  const system = (agent.customSystemPrompt || role.systemPrompt) + '\n\nContext: ' + (role.inputContext||'');
  const userMsg = task.prompt + (opts.context ? '\n\n--- Context provided by user ---\n' + opts.context : '');
  try {
    const res = await cascadeChat(userMsg, { system, onChunk: opts.onChunk || (()=>{}) });
    run.status = 'done'; run.output = res.text; run.provider = res.provider; run.durationMs = now() - run.startedAt; run.finishedAt = now();
    const c2 = await chainNext({kind:'run.done', id:runId, provider:res.provider, len:res.text.length});
    run.prevHash = c2.prevHash; run.hash = c2.hash;
    await idbPut('runs', run);
    if (opts.toast !== false) toast(`✓ ${agent.name} · ${task.title} · ${res.text.length} chars`);
  } catch (e) {
    run.status = 'failed'; run.output = '✗ ' + e.message; run.durationMs = now() - run.startedAt; run.finishedAt = now();
    const c2 = await chainNext({kind:'run.fail', id:runId, error:e.message});
    run.prevHash = c2.prevHash; run.hash = c2.hash;
    await idbPut('runs', run);
    if (opts.toast !== false) toast('✗ ' + e.message, true);
  }
  return run;
}

  nav.innerHTML = TABS.map(t => `<button data-tab="${t.id}" class="${state.active===t.id?'active':''}">${t.label}</button>`).join('');
  nav.querySelectorAll('button').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
}
function switchTab(id) { state.active = id; $$('nav.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab===id)); render(); }
function render() {
  const main = $('#main'); main.innerHTML='';
  const fn = { welcome:renderWelcome, roles:renderRoles, agents:renderAgents, tasks:renderTasks, runs:renderRuns, schedule:renderSchedule, build:renderBuild, providers:renderProviders, packager:renderPackager, inspect:renderInspect, settings:renderSettings, install:renderInstall }[state.active] || renderWelcome;
  fn(main);
}

async function loadWebLLM() {
  state.webllmStatus = 'loading'; $('#webllmMsg').textContent = 'loading…';
  try {
    const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm');
    state.webllmEngine = await CreateMLCEngine('Llama-3.2-3B-Instruct-q4f16_1-MLC', { initProgressCallback: r => { const m=$('#webllmMsg'); if(m) m.textContent = r.text||'loading…'; } });
    state.webllmStatus = 'ready'; $('#webllmMsg').textContent = '✓ loaded';
  } catch (e) { state.webllmStatus = 'unloaded'; $('#webllmMsg').textContent = '✗ ' + e.message; }
}

// ─── FORK SEED ─────────────────────────────────────────────────
function renderPackager(main) {
  if (!state.pkgDraft) state.pkgDraft = JSON.parse(JSON.stringify(SEED));
  main.innerHTML = `
    <div class="section-h"><h2>Fork Seed</h2></div>
    <div class="card">
      <p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Mutate the SEED below, then fork into a new HTML file. The child carries the same scheduler + cascade + packager.</p>
      <textarea id="pkgJson" rows="20" style="font-family:var(--mono);font-size:11px">${esc(JSON.stringify(state.pkgDraft, null, 2))}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px"><button class="btn brass" id="pkgGo">Fork into HTML →</button><button class="btn sm ghost" onclick="state.pkgDraft=JSON.parse(JSON.stringify(SEED_DEFAULT)); render()">reset</button></div>
    </div>
  `;
  $('#pkgGo').addEventListener('click', forkSeed);
}
async function forkSeed() {
  let draft; try { draft = JSON.parse($('#pkgJson').value); } catch(e) { toast('invalid JSON: '+e.message, true); return; }
  const html = await (await fetch(location.href, {cache:'reload'})).text();
  const start = html.indexOf('const SEED_DEFAULT = {');
  let depth=0, end=-1;
  for (let i = start + 'const SEED_DEFAULT = '.length; i < html.length; i++) {
    if (html[i] === '{') depth++; else if (html[i] === '}') { depth--; if (depth === 0) { end=i+1; break; } }
  }
  while (end < html.length && html[end] === ' ') end++;
  if (html[end] === ';') end++;
  const newHtml = html.slice(0,start) + 'const SEED_DEFAULT = ' + jsLiteral(draft) + ';' + html.slice(end);
  const blob = new Blob([newHtml], { type:'text/html' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'fallseed-' + (draft.manifest?.name||'agents').replace(/[^a-z0-9]+/gi,'-') + '-fork.html'; a.click();
  toast('forked · saved');
}

      <p style="font-size:11px;color:var(--cream-muted);font-family:var(--mono);letter-spacing:.06em">level <span style="color:var(--brass)">3</span> · parent <span style="color:var(--brass)">null</span> · MIT</p>
    </div>
    <div class="card">
      <h3>Fellow seeds online</h3>

      <div style="font-family:var(--mono);font-size:11px;color:var(--cream-dim)">${(function(){const peers=Array.from(window.__fellowSeeds?.values?.()||[]);if(!peers.length)return '<div style="color:var(--cream-muted)">none detected · open another FallSeed on this domain</div>';return peers.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(p=>`<div style="padding:6px 0;border-bottom:1px solid var(--line-soft)"><span style="color:var(--brass)">${esc(p.source||'?')}</span> · prime ${esc(String(p.prime||'?'))} · level ${esc(String(p.level??'?'))}</div>`).join('');})()}</div>

// ─── SETTINGS ──────────────────────────────────────────────────
function renderSettings(main) {
  main.innerHTML = `
    <div class="section-h"><h2>Settings</h2></div>
    <div class="card"><h3>Export / import</h3><div style="display:flex;gap:8px"><button class="btn brass sm" onclick="exportAll()">⬇ export JSON</button><button class="btn sm" onclick="document.getElementById('impFile').click()">⬆ import JSON</button><input id="impFile" type="file" accept=".json" style="display:none" onchange="importAll(this.files[0])"></div></div>
    <div class="card"><h3>Wipe</h3><button class="btn danger sm" onclick="wipeAll()">⚠ wipe everything</button></div>
  `;
}
window.exportAll = async function() {
  const b = { seed:SEED, config:{providerConfig:state.providerConfig, chainHead}, agents:await idbGetAll('agents'), tasks:await idbGetAll('tasks'), runs:await idbGetAll('runs'), schedules:await idbGetAll('schedules'), exportedAt:now() };
  const blob = new Blob([JSON.stringify(b,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='fallseed-agents-export-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('exported');
};
window.importAll = async function(file) {
  if (!file) return;
  try {
    const b = JSON.parse(await file.text());
    if (b.seed) { SEED = b.seed; await idbPut('config', SEED, 'forkedSeed'); }
    if (b.config) { state.providerConfig = b.config.providerConfig||{}; chainHead = b.config.chainHead||chainHead; await persistProviderConfig(); await idbPut('config', chainHead, 'chainHead'); }
    for (const st of ['agents','tasks','runs','schedules']) { await idbClear(st); for (const r of (b[st]||[])) await idbPut(st, r); }
    toast('imported'); render();
  } catch (e) { toast('import failed: '+e.message, true); }
};
window.wipeAll = async function() {
  if (!confirm('Wipe every record?')) return;
  for (const st of ['agents','tasks','runs','schedules']) await idbClear(st);
  chainHead = '0'.repeat(64); await idbPut('config', chainHead, 'chainHead');
  toast('wiped'); render();
};
